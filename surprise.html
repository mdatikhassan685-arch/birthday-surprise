<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Surprise 🎁</title>
    
    <link rel="icon" href="./image/Birthday!/logo.png" type="image/png">
    <link rel="stylesheet" href="./css/index.css">
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        #settingsButton, .settings-hint, #settingsModal { display: none !important; }
        .phone-icon img { width: 120px; height: auto; object-fit: contain; }
        @keyframes pulseBtn { 0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 105, 180, 0.5); } 50% { transform: scale(1.08); box-shadow: 0 0 35px rgba(255, 105, 180, 0.9); } 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 105, 180, 0.5); } }
        
        /* 💌 Memory Card CSS */
        .memory-card-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px;
            display: flex; gap: 20px; align-items: center; z-index: 100005;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.3); max-width: 90%; width: 600px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #ffebf0;
        }
        .memory-card-container::before {
            content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px dashed #ff69b4; border-radius: 25px; animation: spinBorder 10s linear infinite; pointer-events: none;
        }
        .memory-content { flex: 1; text-align: left; }
        .memory-content h1 { color: #ff1493; font-family: 'Dancing Script', cursive; font-size: 38px; margin: 0 0 10px 0; }
        .memory-content p { color: #555; font-size: 15px; line-height: 1.5; margin-bottom: 20px; font-family: Arial, sans-serif; }
        .memory-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493); color: white; border: none; padding: 12px 25px;
            border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        }
        .memory-btn:hover { transform: scale(1.05); }
        .memory-image { width: 200px; height: 150px; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .memory-image img { width: 100%; height: 100%; object-fit: cover; }
        
        @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, -40%) scale(0.8); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes spinBorder { 100% { transform: rotate(1deg); } } 
        
        @media(max-width: 600px) {
            .memory-card-container { flex-direction: column; text-align: center; padding: 20px; }
            .memory-content { text-align: center; }
            .memory-image { width: 100%; height: 180px; }
        }
    </style>
</head>

<body>
    <canvas id="matrix-rain" style="display: none;"></canvas>
    <canvas style="position:absolute;width:100%;height:100%;z-index:9999;display:none;" class="canvas"></canvas>
    
    <div id="start-screen" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999995; flex-direction: column; justify-content: center; align-items: center;">
        <button id="startSurpriseBtn" style="background: linear-gradient(135deg, #ff69b4, #ff1493); color: white; border: none; padding: 15px 40px; font-size: 26px; font-family: 'Pacifico', cursive; border-radius: 50px; cursor: pointer; animation: pulseBtn 1.5s infinite;">
            Tap to Start Surprise 🎁
        </button>
    </div>

    <div class="overlay">
        
        <!-- 💌 Memory Card UI -->
        <div id="memoryCardUI" class="memory-card-container" style="display: none;">
            <div class="memory-content">
                <h1 id="memUiHeading">Hyy Baby ❤️</h1>
                <p id="memUiText">Today is your special day...</p>
                <button id="memUiBtn" class="memory-btn">Open Memories ✨</button>
            </div>
            <div class="memory-image">
                <img id="memUiImg" src="./image/Birthday!/cover.jpg" alt="Memory">
            </div>
        </div>

        <div class="stars-container" id="starsContainer"></div>
        <img id="gift-image" src="" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; max-width: 80%; max-height: 80%;" />
        <div class="content-display" id="contentDisplay"><p id="contentText"></p></div>
        <div class="firework-container" id="fireworkContainer"></div>
        <div class="book-container"><div class="book" id="book"></div></div>
        <button class="music-control" id="musicControl" style="display: none;">▶</button>
        <audio id="birthdayAudio" loop><source src="./music/zahra.mp3" type="audio/mpeg"></audio>
        <div class="copyright">Made with 💕 for a Special Birthday</div>
        <div id="orientation-lock"><div class="phone-icon"><img src="./image/Birthday!/screen.png"></div><p>Please rotate your phone</p></div>
    </div>

    <!-- 🛠️ এখানে engine.js এবং main.js লিংক করা হলো -->
    <script src="./jscp/settings_client.js"></script>
    <script src="./jscp/engine.js"></script>
    <script src="./jscp/main.js"></script>
</body>
</html>
