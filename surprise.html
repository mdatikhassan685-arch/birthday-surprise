<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Surprise 🎁</title>
    <meta name="description" content="A special birthday surprise! A beautiful interactive site with animations, music, and memories!">
    
    <link rel="icon" href="./image/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="./image/logo.png">

    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ⚙️ সেটিংস বাটন হাইড */
        #settingsButton, 
        .settings-hint, 
        #settingsModal {
            display: none !important;
            pointer-events: none !important;
        }

        /* 🎯 স্টার্ট বাটনের স্টাইল */
        .start-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            animation: pulseBtn 1.5s infinite;
            margin-top: 20px;
            pointer-events: auto; /* বাটন ক্লিকেবল রাখার জন্য */
        }
        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 8px 25px rgba(255, 105, 180, 0.6); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4); }
        }
        /* অরিয়েন্টেশন লক স্ক্রিনে ক্লিক ইভেন্ট এনাবল করা */
        #orientation-lock {
            pointer-events: auto;
        }
    </style>
</head>

<body>

    <canvas id="matrix-rain" style="display: none;"></canvas>
    <canvas style="position:absolute;width:100%;height:100%;z-index:9999;display:none;" class="canvas"></canvas>
    
    <div class="overlay">
        <div class="stars-container" id="starsContainer"></div>
        <img id="gift-image" src=""
            style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; max-width: 80%; max-height: 80%;" />
        <div class="content-display" id="contentDisplay">
            <p id="contentText"></p>
        </div>
        <div class="firework-container" id="fireworkContainer"></div>
        <div class="book-container">
            <div class="book" id="book"></div>
        </div>

        <button class="music-control" id="musicControl" title="Play/Pause Music">
            ▶
        </button>

        <audio id="birthdayAudio" loop>
            <source src="./music/zahra.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="copyright">
            Made with 💕 for a Special Birthday
        </div>

        <!-- 🎯 স্টার্ট এবং রোটেশন স্ক্রিন -->
        <div id="orientation-lock">
            <div class="phone-icon">
                <img src="./image/screen.png" alt="Rotate Screen">
            </div>
            <br>
            <p id="orientationText">Please rotate your phone<br>(ল্যান্ডস্কেপ করে ধরুন)</p>
            <button id="startSurpriseBtn" class="start-btn" style="display: none;">Tap to Start Surprise 🎉</button>
        </div>
    </div>

    <!-- স্ক্রিপ্ট ফাইলগুলো -->
    <script src="./jscp/settings_client.js"></script>
    <script src="./jscp/main.js"></script>

</body>
</html>
