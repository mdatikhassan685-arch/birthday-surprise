<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Surprise 🎁</title>
    <meta name="description" content="A special birthday surprise!">
    
    <!-- 🛠️ ফিক্স: লোগো (Favicon) পাথ আপডেট করা হয়েছে -->
    <link rel="icon" href="./image/Birthday!/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="./image/Birthday!/logo.png">

    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ⚙️ সেটিংস বাটন হাইড করা */
        #settingsButton, 
        .settings-hint, 
        #settingsModal {
            display: none !important;
            pointer-events: none !important;
        }
    </style>
</head>

<body>

    <canvas id="matrix-rain" style="display: none;"></canvas>
    <canvas style="position:absolute;width:100%;height:100%;z-index:9999;display:none;" class="canvas"></canvas>
    
    <div class="overlay">
        <div class="stars-container" id="starsContainer"></div>
        <img id="gift-image" src=""
            style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; max-width: 80%; max-height: 80%;" />
        <div class="content-display" id="contentDisplay">
            <p id="contentText"></p>
        </div>
        <div class="firework-container" id="fireworkContainer"></div>
        <div class="book-container">
            <div class="book" id="book"></div>
        </div>

        <button class="music-control" id="musicControl" title="Play/Pause Music">
            ▶
        </button>

        <audio id="birthdayAudio" loop autoplay>
            <source src="./music/zahra.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="copyright">
            Made with 💕 for a Special Birthday
        </div>

        <div id="orientation-lock">
            <div class="phone-icon">
                <!-- 🛠️ ফিক্স: রোটেশন আইকনের পাথ আপডেট করা হয়েছে -->
                <img src="./image/Birthday!/screen.png" alt="Rotate Screen" style="width: 80px; height: auto;">
            </div>
            <br>
            <p>Please rotate your phone<br>(ল্যান্ডস্কেপ করে ধরুন)</p>
        </div>

        <!-- 🛠️ ফিক্স: ফুলস্ক্রিন বাটন অ্যাড করা হয়েছে এবং আইকনের পাথ আপডেট করা হয়েছে -->
        <button id="fullscreenBtn" style="position: fixed; bottom: 20px; right: 20px; z-index: 990010; padding: 10px 18px; border-radius: 8px; border: none; background: #222; color: #fff; font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: pointer; display: none;">
            <img style="width: 20px; height: 20px; vertical-align: middle;" src="./image/Birthday!/full.png" alt="Fullscreen">
        </button>
    </div>

    <!-- স্ক্রিপ্ট ফাইলগুলো -->
    <script src="./jscp/settings_client.js"></script>
    <script src="./jscp/main.js"></script>

</body>
</html>
