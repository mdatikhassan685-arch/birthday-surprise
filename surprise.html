<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Surprise 🎁</title>
    <meta name="description" content="A special birthday surprise!">
    
    <link rel="icon" href="./image/Birthday!/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="./image/Birthday!/logo.png">

    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        #settingsButton, .settings-hint, #settingsModal {
            display: none !important;
            pointer-events: none !important;
        }

        /* 🛠️ ফিক্স: রোটেশন এবং ফুলস্ক্রিন স্ক্রিনের নতুন স্টাইল */
        #orientation-lock {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            color: #fff;
            text-align: center;
            font-family: 'Arial', sans-serif;
            font-size: 18px;
        }
        #orientation-lock .phone-icon img {
            width: 80px; height: auto;
            margin-bottom: 20px;
            animation: phone-bounce-smooth 2.2s infinite;
        }
        #startSurpriseBtn {
            margin-top: 30px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.5);
            display: none; /* প্রথমে হাইড করা থাকবে, ল্যান্ডস্কেপ করলে আসবে */
            align-items: center;
            gap: 10px;
            animation: pulseBtn 1.5s infinite;
        }
        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>

<body>
    <canvas id="matrix-rain" style="display: none;"></canvas>
    <canvas style="position:absolute;width:100%;height:100%;z-index:9999;display:none;" class="canvas"></canvas>
    
    <div class="overlay">
        <div class="stars-container" id="starsContainer"></div>
        <img id="gift-image" src="" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; max-width: 80%; max-height: 80%;" />
        <div class="content-display" id="contentDisplay">
            <p id="contentText"></p>
        </div>
        <div class="firework-container" id="fireworkContainer"></div>
        <div class="book-container">
            <div class="book" id="book"></div>
        </div>

        <button class="music-control" id="musicControl" title="Play/Pause Music">▶</button>
        <audio id="birthdayAudio" loop autoplay>
            <source src="./music/zahra.mp3" type="audio/mpeg">
        </audio>

        <div class="copyright">Made with 💕 for a Special Birthday</div>

        <!-- 🛠️ রোটেশন এবং ফুলস্ক্রিন লক স্ক্রিন -->
        <div id="orientation-lock">
            <div class="phone-icon">
                <img src="./image/Birthday!/screen.png" alt="Rotate Screen">
            </div>
            <p id="orientationMsg">Please rotate your phone<br>(ল্যান্ডস্কেপ করে ধরুন)</p>
            
            <!-- ল্যান্ডস্কেপ করার পর এই বাটনটি আসবে -->
            <button id="startSurpriseBtn">
                <img src="./image/Birthday!/full.png" style="width: 20px; filter: invert(1);"> 
                Tap to Start Surprise
            </button>
        </div>
    </div>

    <script src="./jscp/settings_client.js"></script>
    <script src="./jscp/main.js"></script>
</body>
</html>
