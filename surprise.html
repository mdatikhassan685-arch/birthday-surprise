<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Surprise 🎁</title>
    
    <link rel="icon" href="./image/logo.png" type="image/png">
    <link rel="stylesheet" href="./css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        #settingsButton, .settings-hint, #settingsModal { display: none !important; pointer-events: none !important; }
        
        /* 🎯 Start Button Style */
        .start-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: 2px solid white;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
            animation: pulseBtn 1.5s infinite;
            margin-top: 20px;
            pointer-events: auto;
            z-index: 100000;
        }
        @keyframes pulseBtn {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* Orientation Lock UI */
        #orientation-lock {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        #main-content {
            display: none; /* শুরুতে মূল কনটেন্ট লুকানো থাকবে */
        }
    </style>
</head>

<body>

    <!-- 🎯 Start / Rotation UI (সবসময় প্রথমে এটা দেখাবে) -->
    <div id="orientation-lock">
        <div id="rotateMessage">
            <img src="./image/screen.png" alt="Rotate Screen" style="width: 80px; margin-bottom: 20px; animation: phone-bounce-smooth 2s infinite;">
            <h2 style="color: #ff69b4;">Please rotate your phone</h2>
            <p>(অনুগ্রহ করে ফোনটি ল্যান্ডস্কেপ করুন)</p>
        </div>
        
        <button id="startSurpriseBtn" class="start-btn" style="display: none;">Tap to Start Surprise 🎉</button>
    </div>

    <!-- 🎁 Main Content (স্টার্ট বাটনে ক্লিক করার পর এটা দেখাবে) -->
    <div id="main-content">
        <canvas id="matrix-rain" style="display: none;"></canvas>
        <canvas style="position:absolute;width:100%;height:100%;z-index:9999;display:none;" class="canvas"></canvas>
        
        <div class="overlay">
            <div class="stars-container" id="starsContainer"></div>
            <img id="gift-image" src="" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; max-width: 80%; max-height: 80%;" />
            <div class="content-display" id="contentDisplay"><p id="contentText"></p></div>
            <div class="firework-container" id="fireworkContainer"></div>
            
            <div class="book-container">
                <div class="book" id="book"></div>
            </div>

            <button class="music-control" id="musicControl" title="Play/Pause Music">▶</button>
            <audio id="birthdayAudio" loop>
                <source src="./music/zahra.mp3" type="audio/mpeg">
            </audio>

            <div class="copyright">Made with 💕 for a Special Birthday</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./jscp/settings_client.js"></script>
    <script src="./jscp/main.js"></script>

</body>
</html>
