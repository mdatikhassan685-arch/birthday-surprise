<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Surprise 🎁</title>
    <meta name="description" content="A special birthday surprise! A beautiful interactive site with animations, music, and memories!">
    
    <link rel="icon" href="./image/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="./image/logo.png">

    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ⚙️ সেটিংস বাটন এবং অন্যান্য অ্যাডমিন অপশন হাইড করে দিলাম */
        #settingsButton, 
        .settings-hint, 
        #settingsModal {
            display: none !important;
            pointer-events: none !important;
        }
    </style>
</head>

<body>

    <canvas id="matrix-rain" style="display: none;"></canvas>
    <canvas style="position:absolute;width:100%;height:100%;z-index:9999;display:none;" class="canvas"></canvas>
    
    <div class="overlay">
        <div class="stars-container" id="starsContainer"></div>
        <img id="gift-image" src=""
            style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; max-width: 80%; max-height: 80%;" />
        <div class="content-display" id="contentDisplay">
            <p id="contentText"></p>
        </div>
        <div class="firework-container" id="fireworkContainer"></div>
        <div class="book-container">
            <div class="book" id="book"></div>
        </div>

        <button class="music-control" id="musicControl" title="Play/Pause Music">
            ▶
        </button>

        <audio id="birthdayAudio" loop autoplay>
            <!-- ডিফল্ট একটি গান দিয়ে রাখলাম, লোকাল স্টোরেজ থেকে পরে চেঞ্জ হবে -->
            <source src="./music/zahra.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="copyright">
            Made with 💕 for a Special Birthday
        </div>

        <div id="orientation-lock">
            <div class="phone-icon">
                <img src="./image/screen.png" alt="Rotate Screen">
            </div>
            <br>
            <p>Please rotate your phone<br>(ল্যান্ডস্কেপ করে ধরুন)</p>
        </div>
    </div>

    <!-- স্ক্রিপ্ট ফাইলগুলো (যেগুলো এনিমেশন কন্ট্রোল করবে) -->
    <script src="./jscp/settings_client.js"></script>
    <script src="./jscp/main.js"></script>

</body>
</html>
